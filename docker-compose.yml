services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-golek}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-golekpass}
      POSTGRES_DB: ${POSTGRES_DB:-golekthreat}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-golek} -d ${POSTGRES_DB:-golekthreat}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://golek:golekpass@postgres:5432/golekthreat}
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - api

volumes:
  postgres_data:
